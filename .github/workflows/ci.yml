name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-type-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --run

      - name: Build
        env:
          MONGODB_URI: https://example.com
          AUTH_SECRET: example_auth_secret_12345
          EMAIL_FROM: noreply@dayframe.com
          NODE_ENV: production
          GOOGLE_CLIENT_ID: ""
          GOOGLE_CLIENT_SECRET: ""
          RESEND_API_KEY: ""
          GMAIL_USER: ""
          GMAIL_APP_PASSWORD: ""
        run: npm run build
